<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSH Vacuum</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #171717;
      --border: #2a2a2a;
      --text: #f2f2f2;
      --muted: #a3a3a3;
      --accent: #f06a00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 540px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }

    .kicker {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    a.btn {
      display: inline-block;
      text-decoration: none;
      color: #111;
      background: var(--accent);
      border-radius: 8px;
      font-weight: 600;
      padding: 10px 14px;
      font-size: 14px;
    }

    .newsletter {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text);
    }

    .row {
      display: flex;
      gap: 8px;
    }

    input[type="email"] {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      background: #101010;
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    input[type="email"]:focus {
      border-color: var(--accent);
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #111;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #8de28d;
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">Open Source Project</div>
    <h1>OSH Vacuum</h1>
    <p>
      A DIY, open source vacuum cleaner platform designed to be built, improved, and shared.
    </p>

    <div class="actions">
      <a class="btn" href="https://github.com/hkienle/osh-vacuum" target="_blank" rel="noopener noreferrer">
        View on GitHub
      </a>
    </div>

    <section class="newsletter">
      <label for="newsletter-email">Join newsletter updates</label>
      <form id="newsletter-form">
        <div class="row">
          <input id="newsletter-email" name="email" type="email" placeholder="you@example.com" required>
          <button type="submit">Subscribe</button>
        </div>
      </form>
      <div class="hint">For now this is a placeholder signup form.</div>
      <div id="newsletter-status" class="status">Thanks! Your email was captured locally.</div>
    </section>
  </main>

  <script>
    const form = document.getElementById('newsletter-form');
    const status = document.getElementById('newsletter-status');
    const key = 'osh_vac_newsletter_emails';

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const emailInput = document.getElementById('newsletter-email');
      const email = emailInput.value.trim().toLowerCase();
      if (!email) return;

      try {
        const current = JSON.parse(localStorage.getItem(key) || '[]');
        if (!current.includes(email)) current.push(email);
        localStorage.setItem(key, JSON.stringify(current));
      } catch (_) {}

      status.style.display = 'block';
      emailInput.value = '';
    });
  </script>
</body>
</html>
