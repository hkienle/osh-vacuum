; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps = 
	fastled/FastLED@^3.6.0
	bblanchon/ArduinoJson@^6.21.3
	links2004/WebSockets@^2.4.1
	esp32async/ESPAsyncWebServer@^3.8.1
	esp32async/AsyncTCP@^3.4.9
	adafruit/Adafruit SSD1306@^2.5.15
	adafruit/Adafruit GFX Library@^1.12.1
	adafruit/Adafruit SSD1327
lib_ignore = 
	RPAsyncTCP
	ESPAsyncTCP
board_build.filesystem = littlefs

; ------------------------------------------------------------------------------
; OTA upload (ArduinoOTA / espota). Firmware password is set in ota.cpp via
; ArduinoOTA.setPassword(SettingsConfig::OTA_HTTP_PASSWORD).
;
; Keep these in agreement with src/settings/settings_config.h:
;   1) DEVICE_HOSTNAME     -> upload target: <hostname>.local (mDNS) or device IP
;   2) OTA_HTTP_PASSWORD -> upload_flags: --auth=<exact same string>
;
; espota uses only a password (no username). Override upload_port on the CLI if
; needed, e.g.  pio run -e esp32-s3-ota -t upload --upload-port 192.168.1.50
;
; Defaults below match settings_config.example.h (osh-vac / OpenSource).
; ------------------------------------------------------------------------------
[env:esp32-s3-ota]
extends = env:esp32-s3
upload_protocol = espota
upload_port = osh-vac.local
upload_flags =
	--auth=OpenSource
