name: Deploy GitHub Pages

on:
  push:
    branches: [gh_pages_deploy]
    paths:
      - 'Firmware/ui/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Firmware/ui/package-lock.json

      - name: Build hosted UI
        working-directory: Firmware/ui
        env:
          VITE_DEFAULT_TRANSPORT: ble
          VITE_WIFI_TRANSPORT: 'false'
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: Firmware/ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
